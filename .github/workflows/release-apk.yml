name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    name: Build GitHub release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Restore signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          test -n "$SIGNING_KEY_BASE64"
          test -n "$SIGNING_KEY_ALIAS"
          test -n "$SIGNING_KEY_PASSWORD"
          test -n "$SIGNING_STORE_PASSWORD"

          mkdir -p signature
          echo "$SIGNING_KEY_BASE64" | base64 --decode > signature/release.keystore
          cat > signature/keystore_release.properties <<EOF
          storePassword=$SIGNING_STORE_PASSWORD
          keyPassword=$SIGNING_KEY_PASSWORD
          keyAlias=$SIGNING_KEY_ALIAS
          storeFile=../signature/release.keystore
          EOF

      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleGithubRelease --console=plain --no-daemon "-Dorg.gradle.workers.max=2" "-Dorg.gradle.vfs.watch=false"

      - name: Prepare release files
        id: release_files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release
          apk="$(find app/build/outputs/apk/github/release -name '*.apk' -type f | head -n 1)"
          test -f "$apk"

          apk_name="$(basename "$apk")"
          cp "$apk" "release/$apk_name"

          version_name="$(grep -E 'versionName = ' app/build.gradle.kts | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')"
          version_code="$(grep -E 'versionCode = ' app/build.gradle.kts | head -n 1 | sed -E 's/.*= ([0-9]+).*/\1/')"
          tag="${GITHUB_REF_NAME:-manual}"
          sha256="$(sha256sum "release/$apk_name" | awk '{print $1}')"
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${apk_name}"
          notes_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}"

          cat > release/latest.json <<EOF
          {
            "versionName": "$version_name",
            "versionCode": $version_code,
            "tagName": "$tag",
            "apkName": "$apk_name",
            "apkUrl": "$release_url",
            "sha256": "$sha256",
            "releaseNotesUrl": "$notes_url",
            "publishedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

          {
            echo "apk_path=release/$apk_name"
            echo "apk_name=$apk_name"
          } >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-release-apk
          path: |
            release/*.apk
            release/latest.json

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/*.apk release/latest.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "APK release for $GITHUB_REF_NAME"
